name: Build docker image on push

on:
  pull_request:

  push:

jobs:

  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v6
    - name: Build the Docker image
      env:
        EXTENSION_VERSION: ${{ github.head_ref || github.ref_name }}
        GITHUB_ORG: ${{ github.event.pull_request.head.repo.owner.login || github.repository_owner }}
      run: |
        echo "FROM python:3.13-slim-bullseye" >> ci_dockerfile.txt && \
        cat Dockerfile >> ci_dockerfile.txt && \
        echo 'CMD ["./start_servers.sh"]' >> ci_dockerfile.txt

        cat ci_dockerfile.txt

        docker build -f ci_dockerfile.txt -t test:1 . \
        echo "FROM python:3.13-slim-bullseye" | cat - Dockerfile | echo 'CMD ["./start_servers.sh"]' | docker build \
            --build-arg EXTENSION_VERSION=$EXTENSION_VERSION \
            --build-arg GITHUB_ORG=$GITHUB_ORG \
            -
